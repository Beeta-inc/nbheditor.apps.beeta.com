<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening NbhEditor...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        h1 { margin-bottom: 20px; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .info {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Opening NbhEditor...</h1>
        <div class="spinner"></div>
        <p>Redirecting to the app...</p>
        
        <div id="fallback" style="display:none;">
            <p>App didn't open?</p>
            <a href="#" id="retryBtn" class="btn">Try Again</a>
            <a href="https://github.com/beetatechnologies/nbheditor/releases" class="btn">Download App</a>
        </div>
        
        <div class="info">
            <p>Session ID: <strong id="sessionId"></strong></p>
        </div>
    </div>

    <script>
        // Get session ID from URL path
        const pathParts = window.location.pathname.split('/');
        const sessionId = pathParts[pathParts.length - 1];
        document.getElementById('sessionId').textContent = sessionId || 'Unknown';

        // Function to open app
        function openApp() {
            // Try custom scheme first (works immediately)
            window.location.href = `nbheditor://collaborative/${sessionId}`;
            
            // Fallback: Try HTTPS deep link after 1 second
            setTimeout(() => {
                window.location.href = `https://nbheditor.pages.dev/collaborative/${sessionId}`;
            }, 1000);
        }

        // Open app immediately
        openApp();

        // Show fallback options after 3 seconds
        setTimeout(() => {
            document.getElementById('fallback').style.display = 'block';
        }, 3000);

        // Retry button
        document.getElementById('retryBtn').addEventListener('click', (e) => {
            e.preventDefault();
            openApp();
        });

        // Detect if user returns to page (app didn't open)
        let hidden = false;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                hidden = true;
            } else if (hidden) {
                // User came back - app probably didn't open
                document.getElementById('fallback').style.display = 'block';
            }
        });
    </script>
</body>
</html>
